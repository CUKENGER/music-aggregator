services:
  postgres:
    image: postgres:15
    container_name: music-ag-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - music_ag_network

  redis:
    image: redis:7
    container_name: music_redis
    ports:
      - '${REDIS_PORT}:${REDIS_PORT}'
    networks:
      - music_ag_network

  app-api:
    build:
      context: ..
      dockerfile: docker/api-dev/Dockerfile
    container_name: music_ag_app_api
    env_file:
      - .env.template.dev
    depends_on:
      - postgres
      - redis
    ports:
      - '${API_PORT}:${API_PORT}'
      - '51212:51212'
    networks:
      - music_ag_network
    volumes:
      - ..:/app

  app-worker:
    build:
      context: ..
      dockerfile: docker/worker-dev/Dockerfile
    container_name: music_ag_app_worker
    env_file:
      - .env.template.dev
    depends_on:
      - postgres
      - redis
    networks:
      - music_ag_network
    volumes:
      - ..:/app

volumes:
  pgdata:

networks:
  music_ag_network:
    name: music_ag_network
